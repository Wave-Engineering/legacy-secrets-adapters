name: Validate catalog

on:
  push:
    branches: [main, "kahuna/**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      openbao:
        image: quay.io/openbao/openbao:latest
        env:
          BAO_DEV_ROOT_TOKEN_ID: dev-only-root-token
          BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 58200:8200
        options: >-
          --cap-add=IPC_LOCK

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            enlighten \
            hvac \
            jinja2 \
            cryptography \
            pyfuse3 \
            pytest \
            requests

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libfuse3-dev \
            fuse3 \
            swtpm \
            postgresql-client

      - name: Install Ansible
        run: pip install --quiet ansible-core

      - name: Install OpenBao CLI
        run: |
          curl -fsSL https://github.com/openbao/openbao/releases/download/v2.1.0/bao_2.1.0_linux_amd64.deb -o /tmp/bao.deb
          sudo dpkg -i /tmp/bao.deb

      - name: Run validate.sh
        run: ./scripts/ci/validate.sh
